<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Spider Neural Web</title>
<style>
  body { margin:0; background:#05060a; display:flex; justify-content:center; align-items:center; height:100vh; }
  canvas { background:radial-gradient(circle at center,#0a0e1a,#020306); box-shadow:0 0 60px #0af3; }
</style>
</head>
<body>
<canvas id="c" width="800" height="800"></canvas>
<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const W = 800, H = 800, CX = 400, CY = 400;

let phase = 'weave'; // weave, neural, dissolve
let t = 0;

// Web structure
let spokes = 8;
let rings = 9;
let radii = [];
let anchors = [];
let nodes = [];   // {x,y, spoke, ring}
let threads = []; // {a:nodeIdx, b:nodeIdx, drawn:0..1}
let spiderPos = {x:CX, y:CY};
let spiderTarget = {x:CX, y:CY};
let weaveQueue = [];
let weaveIdx = 0;
let signals = [];

function buildWeb(){
  spokes = 8 + Math.floor(Math.random()*5);
  rings = 7 + Math.floor(Math.random()*4);
  radii = [];
  anchors = [];
  nodes = [];
  threads = [];
  signals = [];
  weaveQueue = [];
  weaveIdx = 0;

  const maxR = 360;
  for(let r=0; r<rings; r++){
    radii.push(maxR * (r+1)/rings * (0.9+Math.random()*0.1));
  }
  const angOff = Math.random()*Math.PI;
  // node grid: ring 0 .. rings-1 plus center
  // center node
  const centerIdx = 0;
  nodes.push({x:CX, y:CY, spoke:-1, ring:-1});
  for(let s=0;s<spokes;s++){
    const a = angOff + s/spokes*Math.PI*2 + (Math.random()-0.5)*0.05;
    for(let r=0;r<rings;r++){
      const rr = radii[r]*(0.97+Math.random()*0.06);
      nodes.push({x:CX+Math.cos(a)*rr, y:CY+Math.sin(a)*rr, spoke:s, ring:r, ang:a});
    }
  }
  // index helper
  function nodeIdx(s,r){ return 1 + s*rings + r; }

  // Spoke threads (center outward) - weave order
  for(let s=0;s<spokes;s++){
    // center to ring0
    weaveQueue.push({a:centerIdx, b:nodeIdx(s,0)});
    for(let r=0;r<rings-1;r++){
      weaveQueue.push({a:nodeIdx(s,r), b:nodeIdx(s,r+1)});
    }
  }
  // Spiral / ring threads
  for(let r=0;r<rings;r++){
    for(let s=0;s<spokes;s++){
      const s2=(s+1)%spokes;
      weaveQueue.push({a:nodeIdx(s,r), b:nodeIdx(s2,r)});
    }
  }
}

function startNeural(){
  phase = 'neural';
  t = 0;
  // give nodes pulse phase
  nodes.forEach(n=>{ n.pulse = Math.random()*Math.PI*2; });
  signals = [];
}

function spawnSignal(){
  if(threads.length===0) return;
  const th = threads[Math.floor(Math.random()*threads.length)];
  signals.push({thread:th, p:0, dir:Math.random()<0.5?1:-1, hops:0});
}

function neighborThreads(nodeIdx){
  return threads.filter(t=>t.a===nodeIdx||t.b===nodeIdx);
}

buildWeb();

function lerp(a,b,t){return a+(b-a)*t;}

function update(){
  t++;
  if(phase==='weave'){
    // weave a couple threads per frame
    const speed = 0.06;
    if(weaveIdx < weaveQueue.length){
      const cur = weaveQueue[weaveIdx];
      if(cur.drawn===undefined){ cur.drawn=0; spiderTarget = nodes[cur.b]; }
      cur.drawn += speed;
      // spider rides along
      const A=nodes[cur.a], B=nodes[cur.b];
      spiderPos.x = lerp(A.x,B.x, Math.min(1,cur.drawn));
      spiderPos.y = lerp(A.y,B.y, Math.min(1,cur.drawn));
      if(cur.drawn>=1){
        threads.push(cur);
        weaveIdx++;
      }
    } else {
      // done weaving
      setTimeout(()=>{ if(phase==='weave') startNeural(); }, 0);
      startNeural();
    }
  } else if(phase==='neural'){
    if(t%6===0) spawnSignal();
    for(const sig of signals){
      sig.p += 0.04;
      if(sig.p>=1){
        // arrive at a node, possibly continue
        const arriveNode = sig.dir>0 ? sig.thread.b : sig.thread.a;
        sig.hops++;
        if(sig.hops<4 && Math.random()<0.7){
          const nb = neighborThreads(arriveNode);
          if(nb.length){
            const nt = nb[Math.floor(Math.random()*nb.length)];
            sig.thread = nt;
            sig.dir = (nt.a===arriveNode)?1:-1;
            sig.p = 0;
            // flash node
            const nd = nodes[arriveNode]; nd.flash = 1;
            continue;
          }
        }
        const nd = nodes[arriveNode]; nd.flash = 1;
        sig.dead = true;
      }
    }
    signals = signals.filter(s=>!s.dead);
    nodes.forEach(n=>{ if(n.flash) n.flash*=0.9; });
    if(t>420){ phase='dissolve'; t=0; threads.forEach(th=>th.dis=0); }
  } else if(phase==='dissolve'){
    threads.forEach(th=>{ th.dis = Math.min(1, (th.dis||0)+0.03); });
    if(t>60){
      buildWeb();
      spiderPos={x:CX,y:CY};
      phase='weave'; t=0;
    }
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);

  if(phase==='weave'){
    // dew-like silk threads
    ctx.lineWidth=1;
    for(const th of threads){
      const A=nodes[th.a], B=nodes[th.b];
      ctx.strokeStyle='rgba(200,220,255,0.5)';
      ctx.beginPath(); ctx.moveTo(A.x,A.y); ctx.lineTo(B.x,B.y); ctx.stroke();
    }
    // current being woven
    if(weaveIdx<weaveQueue.length){
      const cur=weaveQueue[weaveIdx];
      if(cur && cur.drawn!==undefined){
        const A=nodes[cur.a],B=nodes[cur.b];
        ctx.strokeStyle='rgba(220,235,255,0.7)';
        ctx.beginPath();ctx.moveTo(A.x,A.y);
        ctx.lineTo(lerp(A.x,B.x,cur.drawn),lerp(A.y,B.y,cur.drawn));ctx.stroke();
      }
    }
    drawSpider(spiderPos.x,spiderPos.y);
  }
  else if(phase==='neural'){
    drawNeural(1);
  }
  else if(phase==='dissolve'){
    drawNeural(0,true);
  }
}

function drawNeural(glowBoost, dissolve){
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  for(const th of threads){
    const A=nodes[th.a], B=nodes[th.b];
    let alpha = 0.25;
    if(dissolve) alpha *= (1-(th.dis||0));
    ctx.strokeStyle='rgba(40,140,255,'+alpha+')';
    ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(B.x,B.y);ctx.stroke();
  }
  // signals
  for(const sig of signals){
    const A=nodes[sig.thread.a], B=nodes[sig.thread.b];
    let p = sig.dir>0?sig.p:1-sig.p;
    const x=lerp(A.x,B.x,p), y=lerp(A.y,B.y,p);
    let a=1; if(dissolve) a*= (1-(sig.thread.dis||0));
    const g=ctx.createRadialGradient(x,y,0,x,y,10);
    g.addColorStop(0,'rgba(150,230,255,'+a+')');
    g.addColorStop(1,'rgba(80,180,255,0)');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(x,y,10,0,7);ctx.fill();
  }
  // nodes
  for(const n of nodes){
    let fl = n.flash||0;
    let r = 2 + fl*5;
    let a = 0.5 + fl*0.5;
    if(dissolve){
      // fade by avg connected thread dissolve
      a *= (1- (n.ring>=0? Math.min(1, (t)/60):0));
    }
    const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,r*3);
    g.addColorStop(0,'rgba(180,240,255,'+a+')');
    g.addColorStop(1,'rgba(60,160,255,0)');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(n.x,n.y,r*3,0,7);ctx.fill();
  }
  ctx.restore();
}

function drawSpider(x,y){
  ctx.save();
  ctx.translate(x,y);
  ctx.strokeStyle='rgba(180,180,200,0.9)';
  ctx.lineWidth=1.3;
  const t2=t*0.3;
  for(let i=0;i<8;i++){
    const side=i<4?-1:1;
    const k=i%4;
    const ang = side*( (k+1)*0.4 ) + (i<4?Math.PI:0)*0;
    const baseA = (i<4? Math.PI*0.5 : -Math.PI*0.5);
    const a = baseA + side*(k-1.5)*0.35;
    const wob = Math.sin(t2+i)*0.1;
    const len=9;
    const mx=Math.cos(a)*len, my=Math.sin(a)*len + wob*4;
    const ex=Math.cos(a)*len*2, ey=Math.sin(a)*len*1.6 + Math.sin(t2+i)*3;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(mx,my);ctx.lineTo(ex,ey);ctx.stroke();
  }
  // body
  ctx.fillStyle='#1a1a22';
  ctx.beginPath();ctx.ellipse(0,5,5,7,0,0,7);ctx.fill();
  ctx.beginPath();ctx.ellipse(0,-3,3.5,3.5,0,0,7);ctx.fill();
  ctx.fillStyle='#6cf';
  ctx.beginPath();ctx.arc(-1.3,-4,0.9,0,7);ctx.arc(1.3,-4,0.9,0,7);ctx.fill();
  ctx.restore();
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
