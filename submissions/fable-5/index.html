<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spider · Web · Neural Net</title>
<style>
  html, body { margin: 0; height: 100%; display: grid; place-items: center; background: #05060c; }
  canvas { background: radial-gradient(circle at 50% 42%, #0c1020 0%, #05060c 70%); border-radius: 4px; }
</style>
</head>
<body>
<canvas id="c" width="800" height="800"></canvas>
<script>
'use strict';
const ctx = document.getElementById('c').getContext('2d');
const W = 800, H = 800, CX = 400, CY = 400;
const rand = (a, b) => a + Math.random() * (b - a);
const clamp01 = v => Math.max(0, Math.min(1, v));
const lerp = (a, b, t) => a + (b - a) * t;

/* ---------------- web geometry ---------------- */
let web;                 // { spokes, segs, pts, anchors }
function buildWeb() {
  const spokes = 12 + Math.floor(Math.random() * 4);
  const angles = [], anchorR = [];
  for (let i = 0; i < spokes; i++) {
    angles.push(i * 2 * Math.PI / spokes + rand(-0.09, 0.09));
    anchorR.push(rand(315, 360));
  }
  const at = (i, f) => ({
    x: CX + Math.cos(angles[i]) * anchorR[i] * f,
    y: CY + Math.sin(angles[i]) * anchorR[i] * f
  });
  const segs = [];
  for (let i = 0; i < spokes; i++)
    segs.push({ a: { x: CX, y: CY }, b: at(i, 1), spoke: true });

  const turns = 8, steps = turns * spokes, f0 = 0.13, f1 = 0.93;
  const pts = [];
  for (let s = 0; s <= steps; s++) {
    const p = at(s % spokes, f0 + (f1 - f0) * s / steps);
    p.r = rand(1.4, 2.6) + (s % spokes === 0 ? 0.9 : 0);
    p.flash = 0;
    pts.push(p);
  }
  for (let s = 0; s < steps; s++) {
    segs.push({ a: pts[s], b: pts[s + 1], fade: rand(0, 0.55), sag: rand(0.5, 1) });
  }
  segs.forEach(g => { if (g.fade === undefined) { g.fade = rand(0, 0.55); } });
  const center = { x: CX, y: CY, r: 3.2, flash: 0 };
  return { spokes, segs, pts, center, anchors: angles.map((_, i) => at(i, 1)) };
}
function neighbors(idx) {                       // graph over spiral points + center(-1)
  const n = [], S = web.spokes, N = web.pts.length;
  if (idx === -1) { for (let i = 0; i < S; i++) n.push(i); return n; }
  if (idx - 1 >= 0) n.push(idx - 1);
  if (idx + 1 < N) n.push(idx + 1);
  if (idx - S >= 0) n.push(idx - S); else n.push(-1);
  if (idx + S < N) n.push(idx + S);
  return n;
}
const nodeAt = idx => idx === -1 ? web.center : web.pts[idx];

/* ---------------- state machine ---------------- */
let state, timer, segIdx, segT, traveling, travelFrom;
let morph = 0, dissolve = 0;
let signals = [], spawnClock = 0;
const spider = { x: CX, y: CY, ang: 0, gait: 0, rest: null };

function reset() {
  web = buildWeb();
  state = 'weave'; timer = 0;
  segIdx = 0; segT = 0; traveling = false;
  morph = 0; dissolve = 0; signals = [];
  spider.x = CX; spider.y = CY;
}

/* ---------------- spider ---------------- */
function moveSpiderToward(tx, ty, speed, dt) {
  const dx = tx - spider.x, dy = ty - spider.y, d = Math.hypot(dx, dy);
  if (d < 1e-3) return true;
  const step = Math.min(d, speed * dt);
  spider.x += dx / d * step; spider.y += dy / d * step;
  spider.ang = Math.atan2(dy, dx);
  spider.gait += step * 0.22;
  return step >= d - 1e-3;
}
function drawSpider(alpha) {
  const { x, y, ang } = spider;
  ctx.save();
  ctx.translate(x, y); ctx.rotate(ang);
  ctx.globalAlpha = alpha;
  ctx.lineCap = 'round';
  // legs: 4 pairs, two-jointed
  const base = [0.55, 0.95, 2.2, 2.6];
  for (let side = -1; side <= 1; side += 2) {
    for (let i = 0; i < 4; i++) {
      const lift = Math.sin(spider.gait + i * 1.7 + (side > 0 ? 0 : Math.PI)) * 0.18;
      const a = side * (base[i] + lift);
      const jx = Math.cos(a) * 11, jy = Math.sin(a) * 11;
      const tx = jx + Math.cos(a + side * 0.55) * 10, ty = jy + Math.sin(a + side * 0.55) * 10;
      ctx.strokeStyle = 'rgba(30,32,44,0.95)';
      ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.moveTo(2, 0); ctx.lineTo(jx, jy); ctx.lineTo(tx, ty); ctx.stroke();
    }
  }
  // abdomen + head
  ctx.fillStyle = '#23273a';
  ctx.beginPath(); ctx.ellipse(-6, 0, 7.5, 5.5, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#2e3350';
  ctx.beginPath(); ctx.arc(4, 0, 4.2, 0, 7); ctx.fill();
  ctx.fillStyle = 'rgba(160,190,255,0.8)';
  ctx.beginPath(); ctx.arc(6.5, -1.4, 0.9, 0, 7); ctx.arc(6.5, 1.4, 0.9, 0, 7); ctx.fill();
  ctx.restore();
}

/* ---------------- signals ---------------- */
function spawnSignal(from) {
  const nb = neighbors(from);
  const to = nb[Math.floor(Math.random() * nb.length)];
  signals.push({ from, to, t: 0, speed: rand(1.6, 3.2), hops: 3 + Math.floor(Math.random() * 4) });
}
function updateSignals(dt) {
  for (let i = signals.length - 1; i >= 0; i--) {
    const s = signals[i];
    s.t += s.speed * dt;
    if (s.t >= 1) {
      const n = nodeAt(s.to); n.flash = 1;
      if (s.hops > 0 && signals.length < 60) {
        const nb = neighbors(s.to).filter(k => k !== s.from);
        const next = nb[Math.floor(Math.random() * nb.length)];
        if (next !== undefined) { s.from = s.to; s.to = next; s.t = 0; s.hops--; continue; }
      }
      signals.splice(i, 1);
    }
  }
}

/* ---------------- rendering ---------------- */
function threadStyle(alpha) {
  // silver → cyan as morph goes 0→1
  const r = lerp(215, 70, morph), g = lerp(220, 205, morph), b = lerp(235, 255, morph);
  return `rgba(${r | 0},${g | 0},${b | 0},${alpha})`;
}
function segAlpha(seg) {
  if (state !== 'dissolve' && state !== 'pause') return 1;
  return clamp01(1 - (dissolve - seg.fade) / 0.4);
}
function drawSeg(seg, partial) {
  const a = segAlpha(seg);
  if (a <= 0) return;
  const bx = partial ? lerp(seg.a.x, seg.b.x, partial) : seg.b.x;
  const by = partial ? lerp(seg.a.y, seg.b.y, partial) : seg.b.y;
  if (morph > 0.02) {                       // glow underlay
    ctx.strokeStyle = threadStyle(0.10 * a * morph);
    ctx.lineWidth = 4.5;
    ctx.beginPath(); ctx.moveTo(seg.a.x, seg.a.y); ctx.lineTo(bx, by); ctx.stroke();
  }
  ctx.strokeStyle = threadStyle(lerp(0.42, 0.75, morph) * a);
  ctx.lineWidth = lerp(0.8, 1.3, morph);
  ctx.beginPath(); ctx.moveTo(seg.a.x, seg.a.y); ctx.lineTo(bx, by); ctx.stroke();
}
function drawNodes() {
  if (morph <= 0.02) return;
  const all = [web.center, ...web.pts];
  for (const n of all) {
    const a = (state === 'dissolve' || state === 'pause')
      ? clamp01(1 - dissolve / 0.8) : 1;
    if (a <= 0) continue;
    const r = (n.r || 3) * morph * (1 + n.flash * 1.6);
    const glow = 0.35 * morph * a + n.flash * 0.6 * a;
    ctx.fillStyle = `rgba(140,230,255,${glow})`;
    ctx.beginPath(); ctx.arc(n.x, n.y, r * 2.6, 0, 7); ctx.fill();
    ctx.fillStyle = `rgba(235,252,255,${(0.85 * morph + n.flash) * a})`;
    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, 7); ctx.fill();
    n.flash *= 0.90;
  }
}
function drawSignals() {
  for (const s of signals) {
    const A = nodeAt(s.from), B = nodeAt(s.to);
    const hx = lerp(A.x, B.x, s.t), hy = lerp(A.y, B.y, s.t);
    const t0 = Math.max(0, s.t - 0.22);
    const tx = lerp(A.x, B.x, t0), ty = lerp(A.y, B.y, t0);
    const grad = ctx.createLinearGradient(tx, ty, hx, hy);
    grad.addColorStop(0, 'rgba(120,220,255,0)');
    grad.addColorStop(1, 'rgba(255,255,255,0.95)');
    ctx.strokeStyle = grad; ctx.lineWidth = 2.4;
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(hx, hy); ctx.stroke();
    ctx.fillStyle = 'rgba(190,240,255,0.5)';
    ctx.beginPath(); ctx.arc(hx, hy, 5, 0, 7); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(hx, hy, 2.2, 0, 7); ctx.fill();
  }
}

/* ---------------- main loop ---------------- */
let last = performance.now();
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000); last = now;
  ctx.clearRect(0, 0, W, H);
  timer += dt;

  if (state === 'weave') {
    const seg = web.segs[segIdx];
    if (traveling) {
      if (moveSpiderToward(seg.a.x, seg.a.y, 340, dt)) traveling = false;
    } else {
      const len = Math.hypot(seg.b.x - seg.a.x, seg.b.y - seg.a.y);
      segT += (170 * dt) / len;
      const px = lerp(seg.a.x, seg.b.x, Math.min(1, segT));
      const py = lerp(seg.a.y, seg.b.y, Math.min(1, segT));
      moveSpiderToward(px, py, 1e4, dt);
      if (segT >= 1) {
        segT = 0; segIdx++;
        if (segIdx >= web.segs.length) { state = 'toRest'; spider.rest = web.anchors[0]; }
        else {
          const nx = web.segs[segIdx];
          if (Math.hypot(nx.a.x - spider.x, nx.a.y - spider.y) > 2) traveling = true;
        }
      }
    }
    for (let i = 0; i < segIdx; i++) drawSeg(web.segs[i]);
    if (segIdx < web.segs.length && !traveling) drawSeg(web.segs[segIdx], segT);
    drawSpider(1);

  } else if (state === 'toRest') {
    web.segs.forEach(g => drawSeg(g));
    if (moveSpiderToward(spider.rest.x, spider.rest.y, 300, dt)) { state = 'morph'; timer = 0; }
    drawSpider(1);

  } else if (state === 'morph') {
    morph = clamp01(timer / 2.2);
    web.segs.forEach(g => drawSeg(g));
    drawNodes();
    drawSpider(1 - morph * 0.55);
    if (morph >= 1) {
      state = 'fire'; timer = 0;
      for (let i = 0; i < web.spokes; i++) spawnSignal(-1);   // burst from center
      web.center.flash = 1;
    }

  } else if (state === 'fire') {
    ctx.globalCompositeOperation = 'lighter';
    web.segs.forEach(g => drawSeg(g));
    updateSignals(dt);
    drawNodes(); drawSignals();
    ctx.globalCompositeOperation = 'source-over';
    spawnClock += dt;
    if (spawnClock > 0.13 && signals.length < 45) {
      spawnClock = 0;
      spawnSignal(Math.floor(Math.random() * web.pts.length));
    }
    drawSpider(0.45);
    if (timer > 7) { state = 'dissolve'; timer = 0; }

  } else if (state === 'dissolve') {
    dissolve = clamp01(timer / 2.4);
    ctx.globalCompositeOperation = 'lighter';
    web.segs.forEach(g => drawSeg(g));
    updateSignals(dt);
    drawNodes(); if (dissolve < 0.5) drawSignals();
    ctx.globalCompositeOperation = 'source-over';
    moveSpiderToward(CX, CY, 190, dt);
    drawSpider(lerp(0.45, 1, dissolve));
    if (dissolve >= 1) { state = 'pause'; timer = 0; }

  } else if (state === 'pause') {
    moveSpiderToward(CX, CY, 190, dt);
    drawSpider(1);
    if (timer > 0.7) reset();
  }

  requestAnimationFrame(frame);
}
reset();
requestAnimationFrame(frame);
</script>
</body>
</html>
