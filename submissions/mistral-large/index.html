<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Web Neural Network</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="800" height="800"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const maxRadius = Math.min(canvas.width, canvas.height) * 0.4;

        let phase = 'weaving';
        let webProgress = 0;
        let neuralProgress = 0;
        let dissolveProgress = 0;
        let rings = 8;
        let spokes = 12;
        let webPoints = [];
        let neuralNodes = [];
        let signals = [];
        let spider = { x: centerX, y: centerY, radius: 10, angle: 0 };

        function initWeb() {
            webPoints = [];
            for (let r = 0; r <= rings; r++) {
                const radius = (r / rings) * maxRadius;
                for (let s = 0; s < spokes; s++) {
                    const angle = (s / spokes) * Math.PI * 2;
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;
                    webPoints.push({ x, y, radius, spoke: s, ring: r });
                }
            }
        }

        function initNeuralNetwork() {
            neuralNodes = [];
            signals = [];
            const nodeCount = 50;
            for (let i = 0; i < nodeCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * maxRadius * 0.8;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                neuralNodes.push({
                    x, y,
                    radius: 3 + Math.random() * 5,
                    connections: [],
                    glow: 0
                });
            }

            for (let i = 0; i < neuralNodes.length; i++) {
                for (let j = i + 1; j < neuralNodes.length; j++) {
                    if (Math.random() > 0.7) {
                        neuralNodes[i].connections.push(j);
                        neuralNodes[j].connections.push(i);
                    }
                }
            }
        }

        function drawSpider() {
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(spider.x, spider.y, spider.radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            for (let i = 0; i < 8; i++) {
                const angle = spider.angle + (i / 8) * Math.PI * 2;
                const legLength = spider.radius * 2 + Math.sin(Date.now() * 0.005 + i) * 2;
                const x1 = spider.x + Math.cos(angle) * spider.radius;
                const y1 = spider.y + Math.sin(angle) * spider.radius;
                const x2 = spider.x + Math.cos(angle) * legLength;
                const y2 = spider.y + Math.sin(angle) * legLength;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
        }

        function drawWeb() {
            ctx.strokeStyle = `rgba(100, 100, 150, ${0.3 + webProgress * 0.7})`;
            ctx.lineWidth = 1;

            for (let r = 0; r <= webProgress * rings; r++) {
                const radius = (r / rings) * maxRadius;
                ctx.beginPath();
                for (let s = 0; s <= spokes; s++) {
                    const angle = (s / spokes) * Math.PI * 2;
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;
                    if (s === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.stroke();
            }

            for (let s = 0; s < spokes; s++) {
                ctx.beginPath();
                for (let r = 0; r <= webProgress * rings; r++) {
                    const radius = (r / rings) * maxRadius;
                    const angle = (s / spokes) * Math.PI * 2;
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;
                    if (r === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.stroke();
            }

            if (webProgress < 1) {
                const targetRing = Math.floor(webProgress * rings);
                const targetSpoke = Math.floor((webProgress * rings - targetRing) * spokes);
                const radius = (targetRing / rings) * maxRadius;
                const angle = (targetSpoke / spokes) * Math.PI * 2;
                spider.x = centerX + Math.cos(angle) * radius;
                spider.y = centerY + Math.sin(angle) * radius;
                spider.angle = angle;
            }
        }

        function drawNeuralNetwork() {
            ctx.strokeStyle = `rgba(50, 150, 255, ${0.1 + neuralProgress * 0.3})`;
            ctx.lineWidth = 1;

            for (let i = 0; i < neuralNodes.length; i++) {
                const node = neuralNodes[i];
                for (let j = 0; j < node.connections.length; j++) {
                    const connectedNode = neuralNodes[node.connections[j]];
                    ctx.beginPath();
                    ctx.moveTo(node.x, node.y);
                    ctx.lineTo(connectedNode.x, connectedNode.y);
                    ctx.stroke();
                }
            }

            for (let i = 0; i < neuralNodes.length; i++) {
                const node = neuralNodes[i];
                const glow = node.glow * (0.5 + neuralProgress * 0.5);
                const gradient = ctx.createRadialGradient(
                    node.x, node.y, 0,
                    node.x, node.y, node.radius * 3
                );
                gradient.addColorStop(0, `rgba(100, 200, 255, ${glow})`);
                gradient.addColorStop(1, `rgba(0, 50, 100, 0)`);
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius * 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = `rgba(100, 200, 255, ${0.5 + glow * 0.5})`;
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            if (Math.random() > 0.95 && signals.length < 5) {
                const startNode = neuralNodes[Math.floor(Math.random() * neuralNodes.length)];
                const endNode = neuralNodes[startNode.connections[Math.floor(Math.random() * startNode.connections.length)]];
                signals.push({
                    start: { x: startNode.x, y: startNode.y },
                    end: { x: endNode.x, y: endNode.y },
                    progress: 0,
                    speed: 0.01 + Math.random() * 0.02
                });
                startNode.glow = 1;
            }

            for (let i = signals.length - 1; i >= 0; i--) {
                const signal = signals[i];
                signal.progress += signal.speed * neuralProgress;

                if (signal.progress >= 1) {
                    const endNode = neuralNodes.find(node =>
                        node.x === signal.end.x && node.y === signal.end.y
                    );
                    if (endNode) endNode.glow = 1;
                    signals.splice(i, 1);
                } else {
                    const x = signal.start.x + (signal.end.x - signal.start.x) * signal.progress;
                    const y = signal.start.y + (signal.end.y - signal.start.y) * signal.progress;
                    ctx.fillStyle = `rgba(255, 255, 255, ${1 - signal.progress})`;
                    ctx.beginPath();
                    ctx.arc(x, y, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (let i = 0; i < neuralNodes.length; i++) {
                neuralNodes[i].glow *= 0.95;
            }
        }

        function drawDissolve() {
            ctx.fillStyle = `rgba(0, 0, 0, ${dissolveProgress * 0.05})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (dissolveProgress < 1) {
                ctx.strokeStyle = `rgba(100, 100, 150, ${1 - dissolveProgress})`;
                ctx.lineWidth = 1;

                for (let r = 0; r <= rings; r++) {
                    const radius = (r / rings) * maxRadius;
                    ctx.beginPath();
                    for (let s = 0; s <= spokes; s++) {
                        const angle = (s / spokes) * Math.PI * 2;
                        const x = centerX + Math.cos(angle) * radius * (1 - dissolveProgress * 0.5);
                        const y = centerY + Math.sin(angle) * radius * (1 - dissolveProgress * 0.5);
                        if (s === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    ctx.stroke();
                }

                for (let s = 0; s < spokes; s++) {
                    ctx.beginPath();
                    for (let r = 0; r <= rings; r++) {
                        const radius = (r / rings) * maxRadius * (1 - dissolveProgress * 0.5);
                        const angle = (s / spokes) * Math.PI * 2;
                        const x = centerX + Math.cos(angle) * radius;
                        const y = centerY + Math.sin(angle) * radius;
                        if (r === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    ctx.stroke();
                }
            }
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (phase === 'weaving') {
                webProgress += 0.005;
                if (webProgress >= 1) {
                    webProgress = 1;
                    phase = 'neural';
                    initNeuralNetwork();
                }
                drawWeb();
                drawSpider();
            } else if (phase === 'neural') {
                neuralProgress += 0.005;
                if (neuralProgress >= 1) {
                    neuralProgress = 1;
                    phase = 'dissolve';
                }
                drawNeuralNetwork();
            } else if (phase === 'dissolve') {
                dissolveProgress += 0.01;
                if (dissolveProgress >= 1) {
                    dissolveProgress = 0;
                    phase = 'weaving';
                    webProgress = 0;
                    initWeb();
                }
                drawDissolve();
            }

            requestAnimationFrame(update);
        }

        initWeb();
        update();
    </script>
</body>
</html>
